name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if image exists'
        required: false
        default: 'false'
      target_version:
        description: 'Target version to build'
        required: false
      publish_to_store:
        description: 'Publish to LazyCat store'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from lzc-build.yml
        id: version
        run: |
          VERSION=$(grep '^version:' lzc-build.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: image
        run: |
          echo "tag=docker.io/codeeagle/remodex-relay:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Output image info
        run: |
          echo "Image tag: ${{ steps.image.outputs.tag }}"
          echo "Note: Image needs to be built and pushed to Docker Hub manually or via configured secrets."
