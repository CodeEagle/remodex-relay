lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.remodex-relay
version: 1.0.0
min_os_version: 1.3.8
name: Remodex Relay
description: WebSocket relay service for Remodex pairing flow
license: ISC
homepage: https://github.com/Emanuele-web04/remodex
author: Emanuele Di Pietro
application:
  subdomain: remodex-relay
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://remodex-relay:3000/
services:
  remodex-relay:
    image: registry.lazycat.cloud/codeeagle/remodex-relay:latest
    environment: {}
    binds: []
locales:
  en:
    name: Remodex Relay
    description: WebSocket relay service for Remodex pairing flow
  zh:
    name: Remodex Relay
    description: Remodex 配对流程的 WebSocket 中继服务
