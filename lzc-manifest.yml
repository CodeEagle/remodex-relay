lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.remodex-relay
version: 1.0.0
min_os_version: 1.3.8
name: Remodex Relay
description: (LazyCat Auto-build) WebSocket relay service for Remodex pairing flow
license: ISC
homepage: https://github.com/Emanuele-web04/remodex
author: Emanuele Di Pietro
application:
  subdomain: remodex-relay
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://remodex-relay:3000/
services:
  remodex-relay:
    image: registry.lazycat.cloud/invokerlaw/library/node:8e74c49667952d1e
    working_dir: /app
    environment:
      PORT: "3000"
    binds: []
    setup_script: |
      mkdir -p /app
      cp -r /lzcapp/pkg/content/* /app/
      cd /app
      npm install --production
      node /app/server.js
locales:
  en:
    name: Remodex Relay
    description: (LazyCat Auto-build) WebSocket relay service for Remodex pairing flow
  zh:
    name: Remodex Relay
    description: （懒猫微服自动构建）Remodex 配对流程的 WebSocket 中继服务
